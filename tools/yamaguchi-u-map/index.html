<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山口大学 自販機・ごみ箱マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; height: 100dvh; }

    /* ヘッダー */
    header { background: #1a3a6b; color: white; padding: 10px 14px; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
    header h1 { font-size: 1rem; font-weight: 700; }
    header p  { font-size: .7rem; opacity: .7; margin-top: 2px; }

    /* キャンパスタブ */
    .campus-tabs { display: flex; background: #122c54; flex-shrink: 0; }
    .campus-tab {
      flex: 1; padding: 9px 4px; text-align: center; font-size: .78rem; font-weight: 600;
      color: rgba(255,255,255,.55); cursor: pointer; border-bottom: 3px solid transparent;
      transition: all .18s; user-select: none;
    }
    .campus-tab:hover  { color: rgba(255,255,255,.85); }
    .campus-tab.active { color: white; border-bottom-color: #60a5fa; background: rgba(255,255,255,.07); }

    /* フィルターバー */
    .controls { background: white; padding: 7px 10px; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; flex-shrink: 0; border-bottom: 1px solid #dde3ea; }
    .btn { display: flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 20px; border: 2px solid transparent; font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-vend  { background: #fff3cd; border-color: #f59e0b; color: #92400e; }
    .btn-trash { background: #d1fae5; border-color: #10b981; color: #065f46; }
    .btn-osm   { background: #dbeafe; border-color: #3b82f6; color: #1e3a8a; }
    .btn.off   { opacity: .35; }
    .btn:hover { transform: scale(1.04); }
    .badge { background: rgba(0,0,0,.12); border-radius: 10px; padding: 1px 6px; font-size: .72rem; }
    .note  { margin-left: auto; font-size: .7rem; color: #94a3b8; }

    /* 地図 */
    #map { flex: 1; width: 100%; }

    /* 情報パネル */
    .info-panel {
      position: absolute; bottom: 68px; right: 10px; background: white;
      border-radius: 10px; padding: 10px 14px; font-size: .78rem; color: #444;
      box-shadow: 0 2px 12px rgba(0,0,0,.18); z-index: 1000; max-width: 210px; display: none;
    }
    .info-panel.visible { display: block; }
    .info-panel h3 { font-size: .85rem; margin-bottom: 4px; color: #1a3a6b; }
    .tag { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: .68rem; margin-bottom: 5px; }
    .tag-vend  { background: #fef3c7; color: #92400e; }
    .tag-trash { background: #d1fae5; color: #065f46; }
    .tag-osm   { background: #dbeafe; color: #1e3a8a; }

    /* ＋ボタン */
    .add-btn {
      position: absolute; bottom: 14px; right: 14px; z-index: 1000;
      background: #1a3a6b; color: white; border: none; border-radius: 50%;
      width: 50px; height: 50px; font-size: 1.5rem; cursor: pointer;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .add-btn:hover { transform: scale(1.08); }

    /* モーダル */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 2000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 14px; padding: 20px; width: 320px; max-width: 92vw; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
    .modal h2 { font-size: 1rem; margin-bottom: 14px; color: #1a3a6b; }
    .modal label { display: block; font-size: .78rem; color: #555; margin-bottom: 3px; margin-top: 10px; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 7px 10px; border: 1.5px solid #cbd5e1; border-radius: 7px; font-size: .85rem; }
    .modal textarea { resize: vertical; min-height: 56px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 9px; border-radius: 8px; border: none; font-size: .85rem; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: #f1f5f9; color: #64748b; }
    .btn-save   { background: #1a3a6b; color: white; }
    .hint { font-size: .7rem; color: #94a3b8; margin-top: 5px; }

    @media (max-width: 480px) {
      header h1 { font-size: .88rem; }
      .note { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>🗺️ 山口大学 自販機・ごみ箱マップ</h1>
  <p>キャンパスを選んで、自販機やごみ箱の場所を確認できます</p>
</header>

<!-- キャンパス切替タブ -->
<div class="campus-tabs">
  <div class="campus-tab active" id="tab-yoshida" onclick="switchCampus('yoshida')">🏫 吉田</div>
  <div class="campus-tab"        id="tab-tokiwa"  onclick="switchCampus('tokiwa')">🏭 常盤</div>
  <div class="campus-tab"        id="tab-kogushi" onclick="switchCampus('kogushi')">🏥 小串</div>
</div>

<!-- フィルター -->
<div class="controls">
  <button class="btn btn-vend"  id="btn-vend"  onclick="toggleLayer('vend')">
    🥤 自動販売機 <span class="badge" id="cnt-vend">0</span>
  </button>
  <button class="btn btn-trash" id="btn-trash" onclick="toggleLayer('trash')">
    🗑️ ごみ箱 <span class="badge" id="cnt-trash">0</span>
  </button>
  <button class="btn btn-osm"   id="btn-osm"   onclick="loadOSM()">
    🌐 OSM取得
  </button>
  <span class="note">※位置は仮データです</span>
</div>

<div id="map"></div>

<!-- 情報パネル -->
<div class="info-panel" id="info-panel">
  <span class="tag" id="info-tag"></span>
  <h3 id="info-name"></h3>
  <p id="info-note" style="font-size:.75rem;color:#666;"></p>
</div>

<!-- ＋追加ボタン -->
<button class="add-btn" onclick="openModal()" title="場所を追加">＋</button>

<!-- 追加モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📍 場所を追加</h2>
    <label>種類</label>
    <select id="m-type">
      <option value="vend">🥤 自動販売機</option>
      <option value="trash">🗑️ ごみ箱</option>
    </select>
    <label>名前・場所の説明</label>
    <input id="m-name" type="text" placeholder="例: 理学部棟1F入口">
    <label>メモ（販売品・分別方法など）</label>
    <textarea id="m-note" placeholder="例: 飲料・温冷両対応"></textarea>
    <label>緯度 / 経度</label>
    <div style="display:flex;gap:6px">
      <input id="m-lat" type="number" step="0.000001" placeholder="緯度">
      <input id="m-lng" type="number" step="0.000001" placeholder="経度">
    </div>
    <p class="hint">💡 地図をクリックすると緯度・経度が自動入力されます</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save"   onclick="saveNew()">追加する</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ========== キャンパス定義 ==========
const CAMPUSES = {
  yoshida: { label: '吉田キャンパス', center: [34.147757, 131.467856], zoom: 17, bounds: [[34.143, 131.462],[34.153, 131.475]] },
  tokiwa:  { label: '常盤キャンパス', center: [33.956553, 131.272345], zoom: 17, bounds: [[33.952, 131.267],[33.961, 131.278]] },
  kogushi: { label: '小串キャンパス', center: [33.958153, 131.24869],  zoom: 17, bounds: [[33.954, 131.243],[33.963, 131.255]] }
};

let currentCampus = 'yoshida';

// ========== 地図初期化 ==========
const map = L.map('map').setView(CAMPUSES.yoshida.center, 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 20
}).addTo(map);

// ========== アイコン ==========
const makeIcon = (emoji, bg) => L.divIcon({
  html: `<div style="background:${bg};border:2.5px solid white;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 6px rgba(0,0,0,.3)">${emoji}</div>`,
  iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-20], className:''
});
const ICONS = { vend: makeIcon('🥤','#f59e0b'), trash: makeIcon('🗑️','#10b981'), osm: makeIcon('📌','#3b82f6') };

// ========== レイヤー管理 ==========
// campusKey -> { vend, trash, osm }
const layerStore = {};
const visible = { vend: true, trash: true, osm: false };
let campusBorder = null;

function getLayers(campus) {
  if (!layerStore[campus]) {
    layerStore[campus] = {
      vend:  L.layerGroup(),
      trash: L.layerGroup(),
      osm:   L.layerGroup()
    };
  }
  return layerStore[campus];
}

function activateLayers(campus) {
  const layers = getLayers(campus);
  ['vend','trash','osm'].forEach(t => {
    if (map.hasLayer(layers[t])) map.removeLayer(layers[t]);
    if (visible[t]) layers[t].addTo(map);
  });
  updateCount(campus);
}

function toggleLayer(type) {
  visible[type] = !visible[type];
  const layers = getLayers(currentCampus);
  visible[type] ? layers[type].addTo(map) : map.removeLayer(layers[type]);
  document.getElementById('btn-' + type).classList.toggle('off', !visible[type]);
  updateCount(currentCampus);
}

function updateCount(campus) {
  const layers = getLayers(campus);
  document.getElementById('cnt-vend').textContent  = layers.vend.getLayers().length;
  document.getElementById('cnt-trash').textContent = layers.trash.getLayers().length;
}

// ========== マーカー追加 ==========
function addMarker(campus, lat, lng, name, note, type) {
  const m = L.marker([lat, lng], { icon: ICONS[type] || ICONS.osm })
    .bindPopup(`<b>${name}</b><br><small>${type==='vend'?'🥤 自動販売機':type==='trash'?'🗑️ ごみ箱':'🌐 OSM'}</small><br><span style="color:#555;font-size:.85em">${note||''}</span>`)
    .on('click', () => showInfo(name, note, type));
  getLayers(campus)[type === 'osm' ? 'osm' : type].addLayer(m);
}

// ========== 情報パネル ==========
function showInfo(name, note, type) {
  const panel = document.getElementById('info-panel');
  panel.classList.add('visible');
  const tag = document.getElementById('info-tag');
  tag.textContent = type==='vend'?'🥤 自動販売機':type==='trash'?'🗑️ ごみ箱':'🌐 OSM';
  tag.className = 'tag ' + (type==='vend'?'tag-vend':type==='trash'?'tag-trash':'tag-osm');
  document.getElementById('info-name').textContent = name;
  document.getElementById('info-note').textContent = note || '';
}
map.on('click', () => document.getElementById('info-panel').classList.remove('visible'));

// ========== キャンパス切替 ==========
function switchCampus(campus) {
  // 前のキャンパスレイヤーを非表示
  const prev = getLayers(currentCampus);
  ['vend','trash','osm'].forEach(t => map.hasLayer(prev[t]) && map.removeLayer(prev[t]));
  if (campusBorder) map.removeLayer(campusBorder);

  currentCampus = campus;

  // タブ切替
  document.querySelectorAll('.campus-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + campus).classList.add('active');

  // 地図移動
  const c = CAMPUSES[campus];
  map.flyTo(c.center, c.zoom, { duration: .8 });

  // 境界ボックス
  campusBorder = L.rectangle(c.bounds, { color:'#1a3a6b', weight:2, fill:false, dashArray:'6 4', opacity:.5 }).addTo(map);

  // レイヤー表示
  activateLayers(campus);

  // OSMレイヤーをリセット（別キャンパスなので再取得が必要）
  getLayers(campus).osm.clearLayers();
  const osmBtn = document.getElementById('btn-osm');
  osmBtn.innerHTML = '🌐 OSM取得';
  osmBtn.disabled = false;
}

// ========== OSM取得 ==========
function loadOSM() {
  const btn = document.getElementById('btn-osm');
  btn.textContent = '読み込み中…';
  btn.disabled = true;
  const b = map.getBounds();
  const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
  const q = `[out:json][timeout:20];(node["amenity"="vending_machine"](${bbox});node["amenity"="waste_basket"](${bbox});node["amenity"="waste_disposal"](${bbox}););out body;`;

  fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
      getLayers(currentCampus).osm.clearLayers();
      data.elements.forEach(e => {
        const isVend = e.tags.amenity === 'vending_machine';
        const name = e.tags.name || (isVend ? '自動販売機（OSM）' : 'ごみ箱（OSM）');
        const note = isVend ? (e.tags.vending || '') : (e.tags.waste || '');
        addMarker(currentCampus, e.lat, e.lon, name, note, 'osm');
      });
      if (!visible.osm) toggleLayer('osm');
      btn.innerHTML = '🌐 OSM取得';
      btn.disabled = false;
      updateCount(currentCampus);
    })
    .catch(() => { btn.innerHTML = '🌐 再取得'; btn.disabled = false; });
}

// ========== モーダル ==========
map.on('click', e => {
  if (document.getElementById('modal').classList.contains('open')) {
    document.getElementById('m-lat').value = e.latlng.lat.toFixed(6);
    document.getElementById('m-lng').value = e.latlng.lng.toFixed(6);
  }
});
function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveNew() {
  const type = document.getElementById('m-type').value;
  const name = document.getElementById('m-name').value.trim();
  const note = document.getElementById('m-note').value.trim();
  const lat  = parseFloat(document.getElementById('m-lat').value);
  const lng  = parseFloat(document.getElementById('m-lng').value);
  if (!name || isNaN(lat) || isNaN(lng)) { alert('名前・緯度・経度を入力してください'); return; }
  addMarker(currentCampus, lat, lng, name, note, type);
  activateLayers(currentCampus);
  // localStorage保存
  const key = 'yu_map_' + currentCampus;
  const saved = JSON.parse(localStorage.getItem(key) || '[]');
  saved.push({ lat, lng, name, note, type });
  localStorage.setItem(key, JSON.stringify(saved));
  closeModal();
  map.setView([lat, lng], 18);
}

// ========== データ読み込み ==========
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    Object.keys(CAMPUSES).forEach(campus => {
      const d = data[campus];
      if (!d) return;
      d.vending_machines.forEach(v => addMarker(campus, v.lat, v.lng, v.name, v.note, 'vend'));
      d.trash_cans.forEach(t       => addMarker(campus, t.lat, t.lng, t.name, t.note, 'trash'));
      // localStorageの追加データ
      const saved = JSON.parse(localStorage.getItem('yu_map_' + campus) || '[]');
      saved.forEach(s => addMarker(campus, s.lat, s.lng, s.name, s.note, s.type));
    });
    switchCampus('yoshida');
  });
</script>
</body>
</html>
