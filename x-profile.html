<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emport AI - X Profile Icon (400x400)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e9edf5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: Arial, "Hiragino Kaku Gothic ProN", sans-serif;
    }
    .avatar {
      width: 400px;
      height: 400px;
      background: #1E3A5F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* 背景の装飾ライン */
    .avatar::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border: 40px solid rgba(201,168,76,0.08);
      border-radius: 50%;
      top: -60px;
      left: -60px;
    }
    .avatar::after {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      border: 24px solid rgba(201,168,76,0.06);
      border-radius: 50%;
      bottom: -60px;
      right: -60px;
    }
    .icon-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .logo-svg { width: 160px; height: 160px; }
    .brand {
      text-align: center;
      letter-spacing: 0.12em;
    }
    .emport {
      font-size: 46px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 0.05em;
    }
    .emport span { color: #C9A84C; }
    .tagline {
      font-size: 15px;
      color: #C9A84C;
      font-weight: 600;
      margin-top: 6px;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="avatar" role="img" aria-label="Emport AI profile icon">
    <div class="icon-wrap">
      <!-- ポートと接続を表すSVGロゴ -->
      <svg class="logo-svg" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 港の波形ベース -->
        <path d="M20 120 Q40 105 60 120 Q80 135 100 120 Q120 105 140 120"
              stroke="#C9A84C" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6"/>
        <path d="M30 132 Q50 117 70 132 Q90 147 110 132 Q130 117 150 132"
              stroke="#C9A84C" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>

        <!-- 中央ノード（AI核心） -->
        <circle cx="80" cy="68" r="16" fill="#C9A84C"/>
        <circle cx="80" cy="68" r="10" fill="#1E3A5F"/>
        <circle cx="80" cy="68" r="4"  fill="#C9A84C"/>

        <!-- 接続ライン -->
        <line x1="80" y1="52" x2="80" y2="28" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="80" y1="84" x2="80" y2="108" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="64" y1="68" x2="36" y2="52" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="96" y1="68" x2="124" y2="52" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="64" y1="68" x2="36" y2="84" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <line x1="96" y1="68" x2="124" y2="84" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

        <!-- 外側ノード -->
        <circle cx="80" cy="26"  r="6" fill="#C9A84C"/>
        <circle cx="34" cy="50"  r="6" fill="#C9A84C"/>
        <circle cx="126" cy="50" r="6" fill="#C9A84C"/>
        <circle cx="80" cy="110" r="6" fill="#ffffff" stroke="#C9A84C" stroke-width="2"/>
        <circle cx="34" cy="86"  r="4" fill="#C9A84C" opacity="0.7"/>
        <circle cx="126" cy="86" r="4" fill="#C9A84C" opacity="0.7"/>
      </svg>

      <div class="brand">
        <div class="emport">Emp<span>o</span>rt</div>
        <div class="tagline">A I</div>
      </div>
    </div>
  </div>
</body>
</html>
