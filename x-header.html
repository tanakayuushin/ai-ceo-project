<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emport AI - X Header (1500x500)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e9edf5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }
    .header {
      width: 1500px;
      height: 500px;
      background: #1E3A5F;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* 背景装飾 */
    .bg-circle-1 {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 60px solid rgba(201,168,76,0.07);
      top: -200px; right: -100px;
    }
    .bg-circle-2 {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 40px solid rgba(201,168,76,0.05);
      bottom: -150px; left: 200px;
    }
    .bg-lines {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.04;
    }

    /* 左側コンテンツ */
    .left {
      position: relative;
      z-index: 2;
      padding: 0 80px;
      flex: 1;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .logo-mark {
      width: 64px; height: 64px;
    }
    .brand-name {
      font-size: 64px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .brand-name span { color: #C9A84C; }

    .tagline-jp {
      font-size: 28px;
      font-weight: 700;
      color: #C9A84C;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    .description {
      font-size: 20px;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      letter-spacing: 0.05em;
    }

    /* 区切りライン */
    .divider {
      position: relative;
      z-index: 2;
      width: 3px;
      height: 260px;
      background: linear-gradient(to bottom, transparent, #C9A84C, transparent);
    }

    /* 右側 */
    .right {
      position: relative;
      z-index: 2;
      padding: 0 80px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50px;
      padding: 12px 28px;
      color: #ffffff;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .pill-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #C9A84C;
      flex-shrink: 0;
    }

    /* 波形装飾（下部） */
    .wave {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      opacity: 0.15;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>

    <!-- 背景ネットワーク線 -->
    <svg class="bg-lines" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
      <line x1="200" y1="100" x2="600" y2="300" stroke="#C9A84C" stroke-width="1"/>
      <line x1="600" y1="300" x2="900" y2="150" stroke="#C9A84C" stroke-width="1"/>
      <line x1="900" y1="150" x2="1200" y2="380" stroke="#C9A84C" stroke-width="1"/>
      <line x1="400" y1="50"  x2="800" y2="400" stroke="#C9A84C" stroke-width="1"/>
      <line x1="1000" y1="50" x2="700" y2="300" stroke="#C9A84C" stroke-width="1"/>
      <circle cx="200" cy="100" r="5" fill="#C9A84C"/>
      <circle cx="600" cy="300" r="5" fill="#C9A84C"/>
      <circle cx="900" cy="150" r="5" fill="#C9A84C"/>
      <circle cx="1200" cy="380" r="5" fill="#C9A84C"/>
      <circle cx="400" cy="50"  r="4" fill="#C9A84C"/>
      <circle cx="800" cy="400" r="4" fill="#C9A84C"/>
      <circle cx="1000" cy="50" r="4" fill="#C9A84C"/>
      <circle cx="700" cy="300" r="4" fill="#C9A84C"/>
    </svg>

    <!-- 左：ブランド -->
    <div class="left">
      <div class="logo-row">
        <svg class="logo-mark" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="28" r="8" fill="#C9A84C"/>
          <circle cx="32" cy="28" r="4" fill="#1E3A5F"/>
          <circle cx="32" cy="28" r="1.5" fill="#C9A84C"/>
          <line x1="32" y1="20" x2="32" y2="10" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
          <line x1="25" y1="28" x2="14" y2="22" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
          <line x1="39" y1="28" x2="50" y2="22" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
          <line x1="32" y1="36" x2="32" y2="46" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
          <circle cx="32" cy="8"  r="3" fill="#C9A84C"/>
          <circle cx="12" cy="20" r="3" fill="#C9A84C"/>
          <circle cx="52" cy="20" r="3" fill="#C9A84C"/>
          <circle cx="32" cy="48" r="3" fill="#ffffff"/>
          <path d="M10 54 Q20 47 30 54 Q40 61 50 54" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
        </svg>
        <div class="brand-name">Emp<span>o</span>rt AI</div>
      </div>
      <div class="tagline-jp">地方から始まる、AIの民主化</div>
      <div class="description">
        山口県の中小企業に、使えるAIを届ける<br>
        AI導入支援 ／ 研修 ／ 補助金サポート
      </div>
    </div>

    <div class="divider"></div>

    <!-- 右：サービス一覧 -->
    <div class="right">
      <div class="pill"><span class="pill-dot"></span>AI業務診断</div>
      <div class="pill"><span class="pill-dot"></span>AI導入コンサルティング</div>
      <div class="pill"><span class="pill-dot"></span>社内AI研修・人材育成</div>
      <div class="pill"><span class="pill-dot"></span>補助金申請サポート</div>
    </div>

    <!-- 波形 -->
    <svg class="wave" viewBox="0 0 1500 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 40 Q150 10 300 40 Q450 70 600 40 Q750 10 900 40 Q1050 70 1200 40 Q1350 10 1500 40 L1500 80 L0 80 Z"
            fill="#C9A84C"/>
    </svg>
  </div>
</body>
</html>
