name: Notion 議事録 → Knowledge Base 自動同期

on:
  schedule:
    - cron: '0 1 * * *'    # 毎朝10:00 JST (01:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/transcription/requirements.txt

      - name: 依存パッケージをインストール
        run: pip install requests python-dotenv

      - name: Notion → Knowledge Base 同期を実行
        run: python tools/transcription/notion_to_knowledge.py
        env:
          NOTION_TOKEN:   ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "Allen [AI CEO]"
          git config user.email "allen-ai-ceo@users.noreply.github.com"
          git add ceo/meeting-notes/ tools/transcription/.notion_knowledge_state.json
          git diff --staged --quiet || git commit -m "knowledge: sync meeting notes from Notion $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
