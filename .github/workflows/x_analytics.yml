name: X Analytics Report

on:
  schedule:
    - cron: '0 1 * * 0'  # 毎週日曜 10:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch X metrics & generate report
        id: analyze
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python tools/social-media/fetch_x_metrics.py 2>&1 | tee /tmp/analytics_result.txt
          echo "result=$(tail -1 /tmp/analytics_result.txt)" >> $GITHUB_OUTPUT

      - name: Commit report
        run: |
          git config user.email "tsubeyou081@gmail.com"
          git config user.name "GitHub Actions"
          git add data/reports/x-analytics.md
          git diff --staged --quiet || git commit -m "analytics: X投稿パフォーマンスレポート更新 $(date +%Y-%m-%d)"
          git push
