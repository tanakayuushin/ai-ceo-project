name: X Analytics Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'   # 毎週月曜 10:00 JST

jobs:
  analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run analytics
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python tools/social-media/x_analytics.py 2>&1 | tee /tmp/analytics.log
          cat /tmp/analytics.log

      - name: Commit report
        run: |
          git config user.email "yuubisinesu@gmail.com"
          git config user.name "GitHub Actions"
          git add departments/marketing/x-posts/engagement-report.md
          git diff --staged --quiet || git commit -m "analytics: Xエンゲージメントレポート更新 $(date '+%Y-%m-%d')"
          git push
