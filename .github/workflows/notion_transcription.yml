name: Notion 音声文字起こし・要約 自動処理

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分ごとに新しい録音をチェック
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write             # 状態ファイルをコミットバックするために必要

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/transcription/requirements.txt

      - name: ffmpeg をインストール
        run: sudo apt-get install -y ffmpeg

      - name: 依存パッケージをインストール
        run: pip install -r tools/transcription/requirements.txt

      - name: 音声文字起こし・要約を実行
        run: python tools/transcription/notion_audio_processor.py
        env:
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID:    ${{ secrets.NOTION_PAGE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 状態ファイルをコミット（新規処理があった場合のみ）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/transcription/.notion_state.json
          git diff --staged --quiet || git commit -m "notion: update transcription state $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
