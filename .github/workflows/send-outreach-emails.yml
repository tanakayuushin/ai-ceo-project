name: 営業メール自動送信

on:
  push:
    paths:
      - 'departments/sales/outreach-drafts/**.md'

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 今回のコミットで追加されたファイルを取得
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'departments/sales/outreach-drafts/*.md' | grep -v 'summary' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 営業メールを送信
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python tools/send_outreach_emails.py
